name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - uses: actions/checkout@v3
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test
      - run: pnpm build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Build control-plane
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/Dockerfile.control-plane
          push: false
          tags: great-koala/control-plane:latest

      - name: Build bridge
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/Dockerfile.bridge
          push: false
          tags: great-koala/bridge:latest
